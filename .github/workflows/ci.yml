name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with Ruff
      run: |
        ruff check src/
        ruff format --check src/

    - name: Test CLI
      run: |
        parma --version
        parma --help

    - name: Test basic transpilation
      run: |
        parma compile examples/demo.py
        ls -la *.sqf

    - name: Test game framework transpilation
      run: |
        parma compile examples/game_framework.py
        parma compile examples/open_world_game.py

    - name: Run comprehensive tests
      run: python -m pytest tests/ -v

    - name: Test SQFVM integration (if available)
      run: |
        parma compile examples/simple_mission_fixed.py --test || echo "SQFVM test skipped"

    - name: Build package
      run: python -m build

  docker-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -f docker/Dockerfile.simple -t parma-test .

    - name: Test Docker build
      run: |
        docker run --rm parma-test parma --version
        docker run --rm -v $(pwd):/workspace parma-test parma compile examples/demo.py